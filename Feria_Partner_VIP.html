<!DOCTYPE html>
<html lang="es" class="theme-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FP PREMIUM</title>
    
    <style>
        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --input: #121212;
            --border: #1f1f1f;
            --text: #ffffff;
            --text-muted: #a1a1aa;
            --accent: #2563eb;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        .theme-light {
            --bg: #ffffff;
            --card: #f5f5f7;
            --input: #ffffff;
            --border: #e5e7eb;
            --text: #000000;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 16px; max-width: 480px; margin: 0 auto; padding-bottom: 60px; overflow-x: hidden; }
        
        .hidden { display: none !important; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo-text { font-weight: 900; font-size: 1.4rem; letter-spacing: -1px; }

        /* CARDS */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 16px; position: relative; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); display: flex; align-items: center; gap: 8px; }

        /* INPUTS */
        label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; display: block; font-weight: 600; }
        input, select { width: 100%; background: var(--input); border: 1px solid var(--border); color: var(--text); padding: 14px; border-radius: 12px; font-size: 1rem; margin-bottom: 12px; outline: none; }
        input:focus { border-color: var(--accent); }

        /* BOTONES */
        .btn-calc { background: var(--accent); color: white; border: none; padding: 8px 14px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }
        .grid-ventas { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-prod { 
            background: var(--input); border: 1px solid var(--border); color: var(--text); 
            padding: 20px 10px; border-radius: 16px; font-weight: bold; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.2s;
        }
        .btn-prod:active { transform: scale(0.95); background: var(--accent); }
        .btn-prod span { font-size: 0.85rem; color: var(--accent); font-weight: 800; }

        /* MODALES */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
        .modal { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 24px; width: 100%; max-width: 380px; }

        .btn-main { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-danger-outline { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 12px; border-radius: 12px; width: 100%; cursor: pointer; font-size: 0.8rem; margin-top: 10px; }

        /* DASHBOARD */
        .progress-container { width: 100%; background: var(--border); height: 12px; border-radius: 6px; margin: 15px 0; overflow: hidden; }
        #v-progress { height: 100%; width: 0%; transition: width 0.8s ease-in-out; background: var(--danger); }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .report-item { background: var(--input); padding: 15px; border-radius: 15px; border: 1px solid var(--border); }
        .report-val { font-size: 1.1rem; font-weight: 900; display: block; color: var(--text); }
        .report-lab { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; }

        .hist-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .license-footer { text-align: center; font-size: 0.6rem; color: var(--text-muted); margin-top: 50px; padding: 20px; border-top: 1px solid var(--border); letter-spacing: 1px; }
    </style>
</head>
<body>

    <!-- MODAL ACTIVACIÓN -->
    <div id="activation-screen" class="modal-overlay hidden">
        <div class="modal" style="text-align: center;">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">🔑</div>
            <h1 style="font-size: 1.1rem; margin-bottom: 20px;">ACTIVAR FP PREMIUM</h1>
            <input type="text" id="lic-name" placeholder="NOMBRE DEL TITULAR" style="text-align: center; text-transform: uppercase; font-weight: bold;">
            <div id="lic-id-box" class="hidden">
                <label>ID DE REGISTRO</label>
                <div id="display-id" style="font-size: 2rem; font-weight: 900; color: var(--accent); margin-bottom: 20px;">000</div>
                <input type="number" id="lic-key" placeholder="CÓDIGO DE ACTIVACIÓN" style="text-align: center;">
            </div>
            <button class="btn-main" id="btn-lic-action">GENERAR ID</button>
        </div>
    </div>

    <!-- MODAL CONFIRMACIÓN -->
    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal" style="text-align: center;">
            <h3 id="confirm-msg" style="margin-bottom: 20px; font-size: 0.9rem;"></h3>
            <button class="btn-main" id="btn-confirm-yes">SÍ, CONTINUAR</button>
            <button class="btn-danger-outline" onclick="closeConfirm()" style="border-color:var(--border); color:var(--text-muted);">CANCELAR</button>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="main-app" class="hidden">
        <div class="header">
            <div class="logo-text">FP<span style="color:var(--accent)">PREMIUM</span></div>
            <button id="theme-toggle" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">🌙</button>
        </div>

        <div class="card">
            <h2>⚙️ CONFIGURACIÓN</h2>
            <label>Proyecto</label>
            <input type="text" id="cfg-stand" placeholder="NOMBRE DEL STAND" oninput="actualizar()">
            <label>Integrantes del Equipo</label>
            <input type="text" id="cfg-team" placeholder="Nombres separados por coma" oninput="actualizar()">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>Inversión</label><input type="text" id="cfg-inv" value="100.000" class="mask-money" oninput="actualizar()"></div>
                <div><label>Stock</label><input type="number" id="cfg-stock" value="50" oninput="actualizar()"></div>
            </div>
            <label>Cantidad de Productos</label>
            <select id="cfg-num" onchange="dibujarInputs()">
                <option value="1">1</option><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option>
            </select>
            <div id="inputs-container"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>🛒 VENTAS</h2>
                <button class="btn-calc" onclick="toggleCalc()">Calculadora</button>
            </div>
            <label>Unidades a vender</label>
            <input type="number" id="v-cant" value="1" style="font-size: 1.5rem; text-align: center; font-weight: 800;">
            <div id="v-btns" class="grid-ventas"></div>
        </div>

        <div class="card">
            <div style="display: grid; grid-template-columns: 1fr 1fr; text-align: center;">
                <div><label>En Caja</label><div id="res-caja" style="font-size: 1.5rem; font-weight: 900;">$0</div></div>
                <div><label>Ganancia</label><div id="res-ganancia" style="font-size: 1.5rem; font-weight: 900; color: var(--success);">$0</div></div>
            </div>
            <div class="progress-container"><div id="v-progress"></div></div>
            <div id="res-status" style="font-size: 0.7rem; text-align: center; font-weight: bold; text-transform: uppercase;"></div>
        </div>

        <div class="card">
            <h2>📝 HISTORIAL</h2>
            <button class="btn-danger-outline" onclick="askDeshacer()" style="margin-bottom:10px; margin-top:0;">ANULAR ÚLTIMA VENTA</button>
            <div id="v-hist" style="max-height: 100px; overflow-y: auto;"></div>
        </div>

        <div class="card">
            <h2>💸 GASTOS EXTRAS</h2>
            <div style="display: flex; gap: 5px;">
                <input id="g-nom" placeholder="Concepto" style="flex:2; margin-bottom:0;">
                <input id="g-val" type="text" placeholder="$" class="mask-money" style="flex:1; margin-bottom:0;">
                <button onclick="addGasto()" style="background:var(--accent); border:none; padding:0 15px; border-radius:10px; color:white; font-weight:bold;">+</button>
            </div>
            <div id="g-list" style="margin-top:10px;"></div>
        </div>

        <div class="card" style="border-color: var(--accent);">
            <h2>📋 REPORTE DE CIERRE</h2>
            <div class="report-grid">
                <div class="report-item"><span class="report-lab">Vendidas</span><span class="report-val" id="rep-v">0</span></div>
                <div class="report-item"><span class="report-lab">Sobrante</span><span class="report-val" id="rep-s">0</span></div>
                <div class="report-item"><span class="report-lab">Estrella</span><span class="report-val" id="rep-e" style="font-size:0.75rem;">-</span></div>
                <div class="report-item"><span class="report-lab">ROI</span><span class="report-val" id="rep-roi">0%</span></div>
            </div>
            <button class="btn-main" onclick="generarReporte()" style="margin-top:15px; background:var(--success);">📄 GENERAR REPORTE PDF</button>
        </div>

        <div style="padding: 10px 0;">
            <button class="btn-danger-outline" onclick="askLogout()" style="border-color: var(--border); color: var(--text);">🔒 CERRAR SESIÓN</button>
            <button class="btn-danger-outline" onclick="askReiniciar()" style="border:none; color:var(--text-muted); font-size:0.6rem;">ELIMINAR DATOS Y REINICIAR</button>
        </div>

        <div class="license-footer">
            TITULAR: <span id="disp-user"></span> | ID: <span id="disp-serial"></span><br>
            Feria Partner
        </div>
    </div>

    <!-- MODAL CALCULADORA -->
    <div id="modal-calc" class="modal-overlay hidden">
        <div class="modal">
            <h2>🖩 CALCULADORA</h2>
            <label>Total de la Venta</label>
            <input type="text" id="c-total" class="mask-money">
            <label>Paga con ($)</label>
            <input type="text" id="c-recibi" class="mask-money" oninput="calcVuelto()" style="border-color: var(--accent);">
            <div style="background:var(--bg); padding:20px; border-radius:15px; text-align:center; margin-top:10px; border: 1px solid var(--border);">
                <label>Su vuelto es:</label>
                <div id="c-vuelto" style="font-size: 2.2rem; font-weight: 900; color: var(--success);">$0</div>
            </div>
            <button class="btn-main" onclick="toggleCalc()" style="margin-top:15px;">LISTO</button>
        </div>
    </div>

    <script>
        let db = { inv: 100000, stock: 50, n: 3, stand: "", team: "", prods: [], ventas: [], gastos: [] };
        const STORAGE_KEY = 'fp_premium_v3_stable';
        let confirmAction = null;

        function formatMoney(value) {
            let num = value.toString().replace(/\D/g, "");
            return num.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }
        function parseMoney(value) { return parseFloat(value.toString().replace(/\./g, "")) || 0; }
        
        function applyMasks() {
            document.querySelectorAll('.mask-money').forEach(input => {
                input.oninput = (e) => { 
                    e.target.value = formatMoney(e.target.value); 
                    // Si es un input de producto, disparar actualización
                    if(e.target.closest('#inputs-container') || e.target.id === 'cfg-inv') actualizar();
                    if(e.target.id === 'c-recibi') calcVuelto();
                };
            });
        }

        function openConfirm(msg, action) {
            document.getElementById('confirm-msg').innerText = msg;
            document.getElementById('confirm-modal').classList.remove('hidden');
            confirmAction = action;
        }
        function closeConfirm() { document.getElementById('confirm-modal').classList.add('hidden'); }
        document.getElementById('btn-confirm-yes').onclick = () => { if(confirmAction) confirmAction(); closeConfirm(); };

        window.onload = () => {
            if (localStorage.getItem('fp_active')) {
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('disp-user').innerText = localStorage.getItem('fp_username');
                arrancar();
            } else {
                document.getElementById('activation-screen').classList.remove('hidden');
            }
            applyMasks();
        };

        document.getElementById('btn-lic-action').onclick = function() {
            const user = document.getElementById('lic-name').value.trim().toUpperCase();
            if(!user || user.length < 3) return;
            if(this.innerText === "GENERAR ID") {
                const id = (user.split('').reduce((a, b) => a + b.charCodeAt(0), 0) % 900) + 100;
                document.getElementById('display-id').innerText = id;
                document.getElementById('lic-id-box').classList.remove('hidden');
                document.getElementById('lic-name').disabled = true;
                this.innerText = "ACTIVAR PREMIUM";
            } else {
                const id = parseInt(document.getElementById('display-id').innerText);
                const key = parseInt(document.getElementById('lic-key').value);
                if(key === (id * 5) + 7) {
                    localStorage.setItem('fp_active', 'true');
                    localStorage.setItem('fp_username', user);
                    location.reload();
                }
            }
        };

        function arrancar() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if(saved) db = JSON.parse(saved);
            document.getElementById('cfg-stand').value = db.stand || "";
            document.getElementById('cfg-team').value = db.team || "";
            document.getElementById('cfg-inv').value = formatMoney(db.inv);
            document.getElementById('cfg-stock').value = db.stock;
            document.getElementById('cfg-num').value = db.n;
            const s = localStorage.getItem('fp_username').split('').reduce((a,b)=>a+b.charCodeAt(0),0);
            document.getElementById('disp-serial').innerText = `PRM-${s}`;
            dibujarInputs();
        }

        function dibujarInputs() {
            db.n = parseInt(document.getElementById('cfg-num').value);
            const cont = document.getElementById('inputs-container');
            cont.innerHTML = '';
            for(let i=0; i<db.n; i++) {
                db.prods[i] = db.prods[i] || {n:`PRODUCTO ${i+1}`, p:1000};
                const div = document.createElement('div');
                div.style = "display:grid; grid-template-columns: 2fr 1fr; gap:8px;";
                // Los oninput ahora solo llaman a actualizar(), y actualizar() leerá del DOM
                div.innerHTML = `<input type="text" value="${db.prods[i].n}" data-product-index="${i}" data-field="name" oninput="actualizar()">
                                 <input type="text" value="${formatMoney(db.prods[i].p)}" class="mask-money" data-product-index="${i}" data-field="price" oninput="actualizar()">`;
                cont.appendChild(div);
            }
            applyMasks();
            actualizar();
        }

        function actualizar() {
            db.stand = document.getElementById('cfg-stand').value.toUpperCase();
            db.team = document.getElementById('cfg-team').value.toUpperCase();
            db.inv = parseMoney(document.getElementById('cfg-inv').value);
            db.stock = parseInt(document.getElementById('cfg-stock').value) || 0;

            // Re-leer los nombres y precios de los productos directamente del DOM
            const newProds = [];
            document.querySelectorAll('#inputs-container > div').forEach((container) => {
                const nameInput = container.querySelector('input[data-field="name"]');
                const priceInput = container.querySelector('input[data-field="price"]');
                if (nameInput && priceInput) {
                    newProds.push({
                        n: nameInput.value.toUpperCase(),
                        p: parseMoney(priceInput.value)
                    });
                }
            });
            db.prods = newProds; // Sobrescribir db.prods con los datos frescos del DOM

            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            render();
        }

        // ... existing code ...

        function render() {
            let caja = 0, uds = 0;
            let cont = {}; // Used for 'Estrella' product count
            const productPrices = {};
            db.prods.forEach(p => productPrices[p.n] = p.p); // Map product names to their current prices

            db.ventas.forEach(v => {
                const currentPrice = productPrices[v.n] || 0;
                const saleTotal = currentPrice * v.c;
                caja += saleTotal;
                uds += v.c;
                cont[v.n] = (cont[v.n]||0) + v.c;
            });
            const egresos = db.inv + db.gastos.reduce((a,b)=>a+b.v, 0);

            document.getElementById('res-caja').innerText = `$${formatMoney(caja)}`;
            document.getElementById('res-ganancia').innerText = `$${formatMoney(Math.max(0, caja - egresos))}`;

            const porc = Math.min((caja / (egresos || 1)) * 100, 100);
            const prog = document.getElementById('v-progress');
            prog.style.width = porc + '%';
            prog.style.background = porc < 40 ? 'var(--danger)' : porc < 100 ? 'var(--warning)' : 'var(--success)';
            document.getElementById('res-status').innerText = caja >= egresos ? "✅ META LOGRADA" : `FALTAN $${formatMoney(egresos-caja)}`;

            const btnArea = document.getElementById('v-btns');
            btnArea.innerHTML = '';
            db.prods.slice(0, db.n).forEach((p, i) => {
                const b = document.createElement('button');
                b.className = 'btn-prod';
                b.innerHTML = `${p.n} <span>$${formatMoney(p.p)}</span>`;
                b.onclick = () => vender(i);
                btnArea.appendChild(b);
            });

            document.getElementById('v-hist').innerHTML = db.ventas.slice(0,5).map(v => {
                const currentPrice = productPrices[v.n] || 0;
                const saleTotal = currentPrice * v.c;
                return `<div class="hist-item"><b>${v.c}x ${v.n}</b> <span>$${formatMoney(saleTotal)}</span></div>`;
            }).join('') || '<p style="text-align:center; opacity:0.1; font-size:0.7rem; padding:10px;">SIN VENTAS</p>';
            document.getElementById('g-list').innerHTML = db.gastos.map(g => `<div class="hist-item" style="color:var(--danger)">${g.n} <span>-$${formatMoney(g.v)}</span></div>`).join('');

            document.getElementById('rep-v').innerText = uds;
            document.getElementById('rep-s').innerText = Math.max(0, db.stock - uds);
            let est = '-', max = 0;
            Object.keys(cont).forEach(k => { if(cont[k]>max){ max=cont[k]; est=k; } });
            document.getElementById('rep-e').innerText = est;
            document.getElementById('rep-roi').innerText = ((caja/(egresos||1))*100).toFixed(0) + '%';
        }

        function vender(i) {
            const cant = parseInt(document.getElementById('v-cant').value) || 1;
            // Solo almacena el nombre del producto y la cantidad. El precio se buscará dinámicamente.
            db.ventas.unshift({n:db.prods[i].n, c:cant});
            document.getElementById('v-cant').value = 1;
            actualizar();
        }

        function addGasto() {
            const n = document.getElementById('g-nom').value;
            const v = parseMoney(document.getElementById('g-val').value);
            if(n && v) {
                db.gastos.push({n: n.toUpperCase(), v: v});
                document.getElementById('g-nom').value = '';
                document.getElementById('g-val').value = '';
                actualizar();
            }
        }

        function toggleCalc() {
            const m = document.getElementById('modal-calc');
            m.classList.toggle('hidden');
            if(!m.classList.contains('hidden')) {
                let lastSaleTotal = 0;
                if (db.ventas.length > 0) {
                    const lastSale = db.ventas[0];
                    const productPrices = {};
                    db.prods.forEach(p => productPrices[p.n] = p.p);
                    const currentPrice = productPrices[lastSale.n] || 0;
                    lastSaleTotal = currentPrice * lastSale.c;
                }
                document.getElementById('c-total').value = formatMoney(lastSaleTotal);
                document.getElementById('c-recibi').value = '';
                document.getElementById('c-vuelto').innerText = '$0';
            }
        }

        function calcVuelto() {
            const t = parseMoney(document.getElementById('c-total').value);
            const r = parseMoney(document.getElementById('c-recibi').value);
            document.getElementById('c-vuelto').innerText = `$${formatMoney(Math.max(0, r-t))}`;
        }

        document.getElementById('theme-toggle').onclick = () => {
            const h = document.documentElement;
            const isDark = h.classList.contains('theme-dark');
            h.classList.replace(isDark ? 'theme-dark' : 'theme-light', isDark ? 'theme-light' : 'theme-dark');
            document.getElementById('theme-toggle').innerText = isDark ? '☀️' : '🌙';
        };

        function askLogout() { openConfirm("¿Cerrar sesión? Los datos se guardarán.", () => { localStorage.removeItem('fp_active'); location.reload(); }); }
        function askReiniciar() { openConfirm("¿BORRAR TODA LA INFORMACIÓN?", () => { localStorage.removeItem(STORAGE_KEY); location.reload(); }); }
        function askDeshacer() { if(db.ventas.length) openConfirm("¿Anular última venta?", () => { db.ventas.shift(); actualizar(); }); }

        function generarReporte() {
            let caja = 0, uds = 0;
            let cont = {}; // Contador para productos vendidos por nombre
            const productPrices = {};
            db.prods.forEach(p => productPrices[p.n] = p.p);

            db.ventas.forEach(v => {
                const currentPrice = productPrices[v.n] || 0;
                const saleTotal = currentPrice * v.c;
                caja += saleTotal;
                uds += v.c;
                cont[v.n] = (cont[v.n] || 0) + v.c;
            });

            const inversionInicial = db.inv;
            const gastosExtras = db.gastos.reduce((a, b) => a + b.v, 0);
            const egresosTotales = inversionInicial + gastosExtras;
            const gananciaNeta = caja - egresosTotales;
            const roi = ((caja / (egresosTotales || 1)) * 100).toFixed(0);

            let est = '-', max = 0;
            Object.keys(cont).forEach(k => {
                if (cont[k] > max) {
                    max = cont[k];
                    est = k;
                }
            });

            const estadoFinalColor = gananciaNeta >= 0 ? '#dcfce7' : '#fee2e2'; // Fondo verde/rojo suave
            const estadoFinalTextColor = gananciaNeta >= 0 ? '#16a34a' : '#dc2626'; // Texto verde/rojo oscuro

            let html = `<!DOCTYPE html>
            <html lang="es">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>Acta de Cierre - ${db.stand || 'Reporte'}</title>
                <style>
                    body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; color: #1a1a1a; margin: 0; }
                    .container { background: #fff; padding: 30px; border-radius: 15px; max-width: 800px; margin: auto; box-shadow: 0 8px 30px rgba(0,0,0,0.08); border: 2px solid #00BCD4; } /* Cian */
                    h1 { color: #00BCD4; text-align: center; font-size: 2rem; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1.5px; }
                    .meta-header { display: flex; justify-content: space-between; margin-bottom: 30px; padding: 15px 20px; background: #f7f7f7; border-radius: 10px; border-left: 4px solid #00BCD4; font-size: 0.9rem; }
                    .section-title { font-size: 1.2rem; color: #2563eb; margin-top: 30px; margin-bottom: 15px; border-bottom: 1px solid #e1e4e8; padding-bottom: 5px; }
                    .grid-2, .grid-3, .grid-4 { display: grid; gap: 15px; margin-bottom: 20px; }
                    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
                    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
                    .grid-4 { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); }
                    .data-box { background: #f7f7f7; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #e1e4e8; }
                    .data-box small { display: block; font-size: 0.7rem; text-transform: uppercase; color: #64748b; margin-bottom: 5px; }
                    .data-box b { font-size: 1.3rem; color: #1a1a1a; }
                    .final-status { text-align: center; margin-top: 25px; padding: 20px; border-radius: 12px; font-weight: 700; font-size: 1.1rem; }
                    table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
                    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #f0f0f0; }
                    th { background: #f7f7f7; color: #2563eb; text-transform: uppercase; border-bottom: 2px solid #2563eb; }
                    .table-summary { background: #f7f7f7; padding: 10px 15px; border-radius: 8px; margin-top: 10px; font-weight: 600; }
                    .footer { text-align: center; font-size: 0.7rem; color: #94a3b8; margin-top: 40px; text-transform: uppercase; letter-spacing: 0.5px; }

                    /* Optimización para PDF y móviles */
                    @media print {
                        body { background: #fff; padding: 0; }
                        .container { box-shadow: none; border: none; border-radius: 0; max-width: 100%; margin: 0; padding: 15px; }
                        h1 { font-size: 1.8rem; margin-bottom: 15px; }
                        .meta-header { flex-direction: column; align-items: flex-start; gap: 10px; margin-bottom: 20px; padding: 10px 15px; }
                        .meta-header div { text-align: left !important; }
                        .section-title { font-size: 1rem; margin-top: 20px; margin-bottom: 10px; }
                        .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; gap: 10px; margin-bottom: 15px; } /* En móvil/PDF, una columna */
                        .data-box { padding: 10px; }
                        .data-box b { font-size: 1.1rem; }
                        .final-status { margin-top: 15px; padding: 15px; font-size: 1rem; }
                        table { font-size: 0.8rem; }
                        th, td { padding: 8px 10px; }
                    }
                </style>
            </head>
            <body>
                <div class="container">
                    <h1>ACTA DE CIERRE OFICIAL</h1>
                    <div class="meta-header">
                    <div><b>STAND:</b> ${db.stand || 'N/A'}<br><b>EQUIPO:</b> ${db.team || 'N/A'}</div>
                    <div style="text-align:right"><b>TITULAR:</b> ${localStorage.getItem('fp_username')}<br><b>FECHA:</b> ${new Date().toLocaleDateString()}</div>
                </div>

                    <h2 class="section-title">I. RESUMEN FINANCIERO</h2>
                    <div class="grid-2">
                        <div class="data-box"><small>Inversión Inicial</small><b>$${formatMoney(inversionInicial)}</b></div>
                        <div class="data-box"><small>Gastos Extras</small><b>$${formatMoney(gastosExtras)}</b></div>
                        <div class="data-box"><small>Total Ventas</small><b>$${formatMoney(caja)}</b></div>
                        <div class="data-box"><small>Balance Neto</small><b style="color:${gananciaNeta >= 0 ? '#16a34a' : '#dc2626'}">$${formatMoney(gananciaNeta)}</b></div>
                        <div class="data-box"><small>Retorno de Inversión (ROI)</small><b>${roi}%</b></div>
                </div>
                    <div class="final-status" style="background:${estadoFinalColor}; color:${estadoFinalTextColor};">
                        ESTADO FINAL: ${gananciaNeta >= 0 ? 'PROYECTO RENTABLE ✅' : 'POR RECUPERAR INVERSIÓN ⏳'}
                    </div>

                    <h2 class="section-title">II. GESTIÓN DE INVENTARIO</h2>
                    <div class="grid-4">
                        <div class="data-box"><small>Stock Inicial</small><b>${db.stock}</b></div>
                        <div class="data-box"><small>Unidades Vendidas</small><b>${uds}</b></div>
                        <div class="data-box"><small>Unidades Sobrantes</small><b>${Math.max(0, db.stock - uds)}</b></div>
                        <div class="data-box"><small>Producto Estrella</small><b style="font-size:0.8rem">${est}</b></div>
                    </div>

                    <h2 class="section-title">III. DESGLOSE POR PRODUCTO</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Unidades Vendidas</th>
                                <th>Subtotal Recaudado</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${db.prods.slice(0, db.n).map(p => {
                                let cant = cont[p.n] || 0;
                                const saleTotal = cant * (productPrices[p.n] || 0);
                                return `<tr>
                                            <td>${p.n}</td>
                                            <td>${cant}</td>
                                            <td>$${formatMoney(saleTotal)}</td>
                                        </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                    <div class="table-summary">
                        Total de Productos: ${db.n}
                    </div>

                    <p class="footer">Documento Oficial Validado por Feria Partner Premium</p>
                </div>
            </body>
            </html>`;

            const blob = new Blob([html], { type: 'text/html;charset=UTF-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `ACTA_CIERRE_${db.stand || 'Reporte'}.html`;
            a.click();
        }
    </script>
</body>
</html>
