<!DOCTYPE html>
<html lang="es" class="theme-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FP STANDARD</title>
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --input: #0f172a;
            --border: #334155;
            --accent: #06b6d4;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 16px; max-width: 480px; margin: 0 auto; padding-bottom: 60px; }
        .hidden { display: none !important; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 16px; border: 1px solid var(--border); }
        h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 12px; }

        label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; display: block; }
        input, select { width: 100%; background: var(--input); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 10px; font-size: 1rem; margin-bottom: 10px; outline: none; }

        .grid-ventas { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-prod { background: var(--input); border: 1px solid var(--accent); color: var(--text); padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        .btn-prod span { font-size: 0.8rem; color: var(--accent); font-weight: 800; }
        .btn-prod:active { transform: scale(0.95); background: var(--accent); }

        .progress-container { width: 100%; background: var(--bg); height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        #v-progress { height: 100%; width: 0%; transition: 0.5s; background: var(--danger); }

        .btn-main { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-text { background: none; border: none; color: var(--text-muted); font-size: 0.7rem; cursor: pointer; text-decoration: underline; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
        .modal { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; }

        .hist-item { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 8px 0; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <!-- ACTIVACIÓN -->
    <div id="activation-screen" class="modal-overlay hidden">
        <div class="modal">
            <h1 style="font-size: 1.1rem; margin-bottom: 20px;">ACTIVAR FP STANDARD</h1>
            <input type="text" id="lic-name" placeholder="NOMBRE DEL TITULAR" style="text-transform: uppercase; text-align: center;">
            <div id="lic-id-box" class="hidden">
                <label>ID DE REGISTRO</label>
                <div id="display-id" style="font-size: 1.5rem; font-weight: bold; color: var(--accent); margin-bottom: 15px;">000</div>
                <input type="number" id="lic-key" placeholder="CLAVE DE ACCESO" style="text-align: center;">
            </div>
            <button class="btn-main" id="btn-lic-action">GENERAR ID</button>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="main-app" class="hidden">
        <div class="header">
            <div style="font-weight: 800; font-size: 1rem;">FP <span style="color:var(--accent)">STANDARD</span></div>
            <button onclick="askLogout()" class="btn-text">CERRAR SESIÓN</button>
        </div>

        <div class="card">
            <h2>⚙️ CONFIGURACIÓN</h2>
            <label>Nombre del Stand</label>
            <input type="text" id="cfg-stand" placeholder="MI STAND" oninput="actualizar()">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>Inversión</label><input type="text" id="cfg-inv" class="mask-money" oninput="actualizar()"></div>
                <div><label>Stock</label><input type="number" id="cfg-stock" oninput="actualizar()"></div>
            </div>
            <label>Cantidad de Productos</label>
            <select id="cfg-num" onchange="dibujarInputs()">
                <option value="1">1</option><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option>
            </select>
            <div id="inputs-container"></div>
        </div>

        <div class="card">
            <h2>🛒 VENTAS</h2>
            <label>Unidades a vender</label>
            <input type="number" id="v-cant" value="1" style="text-align: center; font-weight: bold; font-size: 1.5rem;">
            <div id="v-btns" class="grid-ventas" style="margin-top: 15px;"></div>
        </div>

        <div class="card">
            <h2>📊 BALANCE</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; text-align: center;">
                <div><label>En Caja</label><div id="res-caja" style="font-size: 1.5rem; font-weight: bold;">$0</div></div>
                <div><label>ROI</label><div id="res-roi" style="font-size: 1.5rem; font-weight: bold;">0%</div></div>
            </div>
            <div class="progress-container"><div id="v-progress"></div></div>
            <p id="res-status" style="font-size: 0.7rem; text-align: center; font-weight: bold; text-transform: uppercase;"></p>
        </div>

        <div class="card">
            <h2>📝 ÚLTIMAS VENTAS</h2>
            <button onclick="deshacer()" class="btn-text" style="color:var(--danger); width: 100%; margin-bottom: 10px; text-decoration: none; font-weight: bold;">↩️ ANULAR ÚLTIMA VENTA</button>
            <div id="v-hist"></div>
        </div>

        <button class="btn-main" onclick="generarReporte()">📄 DESCARGAR REPORTE (.TXT)</button>
        
        <div style="text-align: center; margin-top: 20px;">
            <button onclick="askReiniciar()" class="btn-text" style="color:var(--danger)">Borrar todos los datos y reiniciar</button>
        </div>

        <div style="text-align: center; font-size: 0.6rem; color: var(--text-muted); margin-top: 40px; border-top: 1px dotted var(--border); padding-top: 20px;">
            FP STANDARD | Titular: <span id="disp-user"></span><br>FERIA PARTNER
        </div>
    </div>

    <script>
        let db = { inv: 100000, stock: 50, n: 3, stand: "", prods: [], ventas: [] };
        const STORAGE_KEY = 'fp_std_v2_final';

        function formatMoney(v) { return v.toString().replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function parseMoney(v) { return parseFloat(v.toString().replace(/\./g, "")) || 0; }
        
        window.onload = () => {
            if (localStorage.getItem('fp_std_active')) {
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('disp-user').innerText = localStorage.getItem('fp_std_user');
                arrancar();
            } else { document.getElementById('activation-screen').classList.remove('hidden'); }
        };

        document.getElementById('btn-lic-action').onclick = function() {
            const user = document.getElementById('lic-name').value.trim().toUpperCase();
            if(!user || user.length < 3) return;
            if(this.innerText === "GENERAR ID") {
                const id = (user.split('').reduce((a, b) => a + b.charCodeAt(0), 0) % 900) + 100;
                document.getElementById('display-id').innerText = id;
                document.getElementById('lic-id-box').classList.remove('hidden');
                this.innerText = "ACTIVAR STANDARD";
            } else {
                const id = parseInt(document.getElementById('display-id').innerText);
                if(parseInt(document.getElementById('lic-key').value) === (id * 3) + 7) {
                    localStorage.setItem('fp_std_active', 'true');
                    localStorage.setItem('fp_std_user', user);
                    location.reload();
                }
            }
        };

        function arrancar() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if(saved) db = JSON.parse(saved);
            document.getElementById('cfg-stand').value = db.stand || "";
            document.getElementById('cfg-inv').value = formatMoney(db.inv);
            document.getElementById('cfg-stock').value = db.stock;
            document.getElementById('cfg-num').value = db.n;
            dibujarInputs();
        }

        function dibujarInputs() {
            db.n = parseInt(document.getElementById('cfg-num').value);
            const cont = document.getElementById('inputs-container');
            cont.innerHTML = '';
            for(let i=0; i<db.n; i++) {
                if(!db.prods[i]) db.prods[i] = {n:`PRODUCTO ${i+1}`, p:1000};
                
                const div = document.createElement('div');
                div.style = "display:grid; grid-template-columns: 2fr 1fr; gap:5px; margin-bottom:5px;";
                
                const inName = document.createElement('input');
                inName.value = db.prods[i].n;
                inName.oninput = (e) => { db.prods[i].n = e.target.value.toUpperCase(); actualizar(); };
                
                const inPrice = document.createElement('input');
                inPrice.value = formatMoney(db.prods[i].p);
                inPrice.oninput = (e) => { 
                    e.target.value = formatMoney(e.target.value); 
                    db.prods[i].p = parseMoney(e.target.value); 
                    actualizar(); 
                };
                
                div.appendChild(inName);
                div.appendChild(inPrice);
                cont.appendChild(div);
            }
            actualizar();
        }

        function actualizar() { 
            db.stand = document.getElementById('cfg-stand').value.toUpperCase();
            db.inv = parseMoney(document.getElementById('cfg-inv').value);
            db.stock = parseInt(document.getElementById('cfg-stock').value) || 0;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            render(); 
        }

        function render() {
            let caja = 0, uds = 0;
            db.ventas.forEach(v => { 
                const prod = db.prods.find(p => p.n === v.n) || {p:0};
                caja += (prod.p * v.c); uds += v.c; 
            });

            document.getElementById('res-caja').innerText = `$${formatMoney(caja)}`;
            const roi = ((caja / (db.inv || 1)) * 100).toFixed(0);
            document.getElementById('res-roi').innerText = roi + "%";
            
            const porc = Math.min(roi, 100);
            const pb = document.getElementById('v-progress');
            pb.style.width = porc + '%';
            pb.style.background = porc < 100 ? 'var(--warning)' : 'var(--success)';
            document.getElementById('res-status').innerText = caja >= db.inv ? "META LOGRADA ✅" : `FALTA: $${formatMoney(db.inv-caja)}`;

            // BOTONES DE VENTA DINÁMICOS
            const btnArea = document.getElementById('v-btns');
            btnArea.innerHTML = '';
            db.prods.slice(0, db.n).forEach((p) => {
                const b = document.createElement('button');
                b.className = 'btn-prod';
                b.innerHTML = `${p.n} <span>$${formatMoney(p.p)}</span>`;
                b.onclick = () => {
                    const cant = parseInt(document.getElementById('v-cant').value) || 1;
                    db.ventas.unshift({n:p.n, c:cant});
                    document.getElementById('v-cant').value = 1;
                    actualizar();
                };
                btnArea.appendChild(b);
            });

            document.getElementById('v-hist').innerHTML = db.ventas.slice(0,5).map(v => {
                const price = (db.prods.find(p => p.n === v.n) || {p:0}).p;
                return `<div class="hist-item"><b>${v.c}x ${v.n}</b> <span>$${formatMoney(v.c * price)}</span></div>`;
            }).join('') || '<p style="text-align:center; opacity:0.2; font-size:0.7rem;">Esperando ventas...</p>';
        }

        function askLogout() { if(confirm("¿Cerrar sesión? Se guardarán los datos.")) { localStorage.removeItem('fp_std_active'); location.reload(); } }
        function askReiniciar() { if(confirm("¿BORRAR TODO? Esta acción es irreversible.")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }
        function deshacer() { if(db.ventas.length && confirm("¿Anular última venta?")) { db.ventas.shift(); actualizar(); } }

        function generarReporte() {
            let caja = 0, uds = 0;
            db.ventas.forEach(v => { 
                const price = (db.prods.find(p => p.n === v.n) || {p:0}).p;
                caja += (price * v.c); uds += v.c; 
            });
            let txt = `REPORTE DE CIERRE - FP STANDARD\n`;
            txt += `Stand: ${db.stand}\nTitular: ${localStorage.getItem('fp_std_user')}\n`;
            txt += `Fecha: ${new Date().toLocaleString()}\n`;
            txt += `------------------------------\n`;
            txt += `Inversion: $${formatMoney(db.inv)}\n`;
            txt += `Ventas Totales: $${formatMoney(caja)}\n`;
            txt += `Balance Neto: $${formatMoney(caja-db.inv)}\n`;
            txt += `ROI: ${((caja/(db.inv||1))*100).toFixed(0)}%\n`;
            txt += `Unidades vendidas: ${uds}\n`;
            txt += `------------------------------\n`;
            txt += `Generado por Feria Partner Standard`;

            const blob = new Blob([txt], {type:'text/plain;charset=UTF-8'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Reporte_${db.stand}.txt`;
            a.click();
        }
    </script>
</body>
</html>
